services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openrenew
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openrenew}
      POSTGRES_DB: openrenew
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrenew"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
